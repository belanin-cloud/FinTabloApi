limit_req_zone $binary_remote_addr zone=fintablo_proxy_ratelimit:10m rate=10r/s;

server {
    listen 443 ssl;
    server_name fintablo-proxy.example.com;

    location / {
        limit_req zone=fintablo_proxy_ratelimit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }
}
